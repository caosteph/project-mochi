name: Lint

# This project lints with Ruff (not pylint) — see pyproject.toml's [tool.ruff] and
# scripts/verify_all.sh. The full test suite needs Postgres+pgvector and the model verifies
# need Ollama, so CI is scoped to linting; correctness is verified locally per CLAUDE.md.

on:
  push:
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      # Pinned to the version used locally so CI can't drift and flag new lints.
      - name: Ruff check
        run: uvx ruff@0.15.21 check app/ tests/ scripts/
